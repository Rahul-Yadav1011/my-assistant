name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.29.0'
          cache: true

      - name: Generate android folder
        run: |
          flutter create . \
            --project-name my_assistant \
            --org com.example \
            --platforms android

      - name: Apply custom AndroidManifest
        run: cp android_overrides/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Patch app gradle file
        run: |
          if [ -f "android/app/build.gradle.kts" ]; then
            GRADLE_FILE="android/app/build.gradle.kts"
            echo "Detected Kotlin DSL: $GRADLE_FILE"

            # minSdk 24 (required by flutter_tts)
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/g' "$GRADLE_FILE"

            # compileSdk 36 (required by flutter_tts)
            sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/g' "$GRADLE_FILE"

            # NDK 27.0.12077973 (required by several plugins)
            sed -i 's|ndkVersion = flutter.ndkVersion|ndkVersion = "27.0.12077973"|g' "$GRADLE_FILE"
            # Fallback: add ndkVersion if missing entirely
            if ! grep -q "ndkVersion" "$GRADLE_FILE"; then
              sed -i '/compileSdk =/a\    ndkVersion = "27.0.12077973"' "$GRADLE_FILE"
            fi

            # Enable desugaring (needed by flutter_local_notifications)
            if ! grep -q "isCoreLibraryDesugaringEnabled" "$GRADLE_FILE"; then
              sed -i '/compileOptions {/a\        isCoreLibraryDesugaringEnabled = true' "$GRADLE_FILE"
            fi

            if ! grep -q "desugar_jdk_libs" "$GRADLE_FILE"; then
              echo "" >> "$GRADLE_FILE"
              echo "dependencies {" >> "$GRADLE_FILE"
              echo '    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")' >> "$GRADLE_FILE"
              echo "}" >> "$GRADLE_FILE"
            fi

          elif [ -f "android/app/build.gradle" ]; then
            GRADLE_FILE="android/app/build.gradle"
            echo "Detected Groovy DSL: $GRADLE_FILE"

            sed -i 's/minSdk flutter.minSdkVersion/minSdk 24/g' "$GRADLE_FILE"
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/g' "$GRADLE_FILE"
            sed -i 's/compileSdk flutter.compileSdkVersion/compileSdk 36/g' "$GRADLE_FILE"
            sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 36/g' "$GRADLE_FILE"
            sed -i 's|ndkVersion flutter.ndkVersion|ndkVersion "27.0.12077973"|g' "$GRADLE_FILE"

            if ! grep -q "ndkVersion" "$GRADLE_FILE"; then
              sed -i '/compileSdk/a\    ndkVersion "27.0.12077973"' "$GRADLE_FILE"
            fi

            if ! grep -q "coreLibraryDesugaringEnabled" "$GRADLE_FILE"; then
              sed -i '/compileOptions {/a\        coreLibraryDesugaringEnabled true' "$GRADLE_FILE"
            fi

            if ! grep -q "desugar_jdk_libs" "$GRADLE_FILE"; then
              echo "" >> "$GRADLE_FILE"
              echo "dependencies {" >> "$GRADLE_FILE"
              echo "    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'" >> "$GRADLE_FILE"
              echo "}" >> "$GRADLE_FILE"
            fi

          else
            echo "ERROR: No gradle file found in android/app/"
            ls -la android/app/
            exit 1
          fi

          echo "---- Patched gradle file ----"
          cat "$GRADLE_FILE"

      - name: flutter pub get
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
