name: mitra
description: "Mitra — your personal voice-driven assistant."
publish_to: 'none'
version: 0.6.0+9

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  permission_handler: ^11.3.1
  speech_to_text: ^7.0.0
  flutter_tts: ">=4.0.0 <4.2.0"
  google_generative_ai: ^0.4.6
  http: ^1.2.2
  webfeed_revised: ^0.7.1
  url_launcher: ^6.3.0
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#1a1033"
  adaptive_icon_foreground: "assets/icon_foreground.png"
